<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Portboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="titlebar">
    <span class="brand">Portboard</span>
    <div class="actions">
      <div class="menu-wrap">
        <button id="btn-import" class="primary">가져오기 ▾</button>
        <div id="import-menu" class="popmenu" hidden>
          <button class="popmenu-item" data-src="cmux"><span class="ic">⌘</span> cmux 워크스페이스</button>
          <button class="popmenu-item" data-src="git"><span class="ic">⎇</span> 로컬 Git 저장소…</button>
          <button class="popmenu-item" data-src="folder"><span class="ic">📁</span> 폴더에서 추가…</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="list" id="list"></section>
    <section class="logs" id="logpane" hidden>
      <div class="logs-head">
        <span id="log-title">로그</span>
        <button id="log-close" class="ghost small">← 뒤로</button>
      </div>
      <pre id="log-body" class="log-body"></pre>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
