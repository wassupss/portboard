<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Portboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="titlebar">
    <span class="brand">
      <svg class="brand-svg" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="5" y="6" width="15" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2.4"/>
        <line x1="9" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2"/>
        <line x1="9" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="2"/>
        <path d="M15 20 l4 5 l9 -12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">Portboard</span>
      <span id="brand-count" class="brand-count" hidden></span>
    </span>
    <div class="actions">
      <button id="btn-docker" class="ghost" title="Docker Desktop">🐳</button>
      <div class="menu-wrap">
        <button id="btn-menu" class="primary">메뉴 ▾</button>
        <div id="app-menu" class="popmenu" hidden>
          <div class="popmenu-head" data-i="m_import"></div>
          <button class="popmenu-item" data-act="import-cmux"><span class="ic">⌘</span><span class="label"></span></button>
          <button class="popmenu-item" data-act="import-git"><span class="ic">⎇</span><span class="label"></span></button>
          <button class="popmenu-item" data-act="import-folder"><span class="ic">📁</span><span class="label"></span></button>
          <div class="popmenu-sep"></div>
          <div class="popmenu-head" data-i="m_lang"></div>
          <button class="popmenu-item" data-act="lang-ko"><span class="ic"></span><span class="label">한국어</span></button>
          <button class="popmenu-item" data-act="lang-en"><span class="ic"></span><span class="label">English</span></button>
          <div class="popmenu-sep"></div>
          <button class="popmenu-item" data-act="hotkey"><span class="ic">⌨</span><span class="label"></span></button>
          <button class="popmenu-item" data-act="view"><span class="ic">⤢</span><span class="label"></span></button>
        </div>
      </div>
    </div>
  </header>

  <div id="update-bar" class="update-bar" hidden>
    <span id="update-text"></span>
    <span class="update-actions">
      <button id="update-download" class="primary small"></button>
      <button id="update-dismiss" class="ghost small">✕</button>
    </span>
  </div>

  <main>
    <section class="list" id="list"></section>
    <section class="logs" id="logpane" hidden>
      <div class="logs-head">
        <span id="log-title">로그</span>
        <button id="log-close" class="ghost small">← 뒤로</button>
      </div>
      <pre id="log-body" class="log-body"></pre>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
