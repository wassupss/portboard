name: Release

# Cut a release by pushing a tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  release:
    runs-on: macos-14   # Apple Silicon runner → arm64 build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build   # tsc + copy static assets into build/

      # Unsigned build (default). Passing empty CSC_* secrets makes electron-builder
      # mis-detect a certificate, so we DON'T set them here.
      - name: Build & publish (unsigned)
        if: ${{ vars.SIGNED != 'true' }}
        run: npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Signed + notarized build. To enable: add the Apple Developer secrets below and set a
      # repo variable SIGNED=true, then also set "mac": { "notarize": true } in package.json.
      - name: Build & publish (signed + notarized)
        if: ${{ vars.SIGNED == 'true' }}
        run: npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
