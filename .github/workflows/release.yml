name: Release

# Cut a release by pushing a tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  release:
    runs-on: macos-14   # Apple Silicon runner → arm64 build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build   # tsc

      - name: Build & publish to GitHub Releases
        run: npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing & notarization (optional) ---
          # Unsigned by default: with no CSC_LINK secret, signing is skipped and an
          # unsigned .dmg/.zip is published (users right-click → Open on first launch).
          # To ship a signed + notarized build, add these repo secrets:
          #   CSC_LINK                      base64 of your Developer ID .p12
          #   CSC_KEY_PASSWORD              the .p12 password
          #   APPLE_ID                      your Apple ID email
          #   APPLE_APP_SPECIFIC_PASSWORD   app-specific password for notarization
          #   APPLE_TEAM_ID                 your Apple Developer Team ID
          # …and set "mac.notarize": true in package.json build config.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
